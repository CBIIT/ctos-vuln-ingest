services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-vuln_ingest}
      POSTGRES_USER:     ${DB_USER:-vuln_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vuln_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
